<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>感谢老师</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: #050510;
    color: #fff;
    font-family: Arial, "PingFang SC", sans-serif;
}

/* 粒子背景 */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* 中心卡片 */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
    padding: 40px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(0,255,255,0.3);
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(0,255,255,0.2);
    backdrop-filter: blur(10px);
}

h1 {
    font-size: 26px;
    line-height: 1.8;
    text-shadow: 0 0 15px #00f6ff;
}

/* 打字光标 */
.cursor {
    display: inline-block;
    width: 10px;
    background: #00f6ff;
    margin-left: 5px;
    animation: blink 0.8s infinite;
}

@keyframes blink {
    0%,50% { opacity: 1; }
    51%,100% { opacity: 0; }
}

.emoji {
    font-size: 40px;
    margin-top: 10px;
    animation: float 2s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.tip {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.6;
}

button {
    margin-top: 15px;
    padding: 10px 18px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg,#00f6ff,#6a5cff);
    color: white;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(0,255,255,0.4);
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="card">
    <h1 id="text"></h1><span class="cursor"></span>
    <div class="emoji">🫡</div>

    <button onclick="unlockMusic()">点击此位置播放音乐🎶</button>

    <div class="tip">注意音量🔊</div>

    <audio id="music" loop autoplay muted>
        <source src="tafei.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
// ===== 打字机效果 =====
const text = "谢谢肖瑶老师的 帮助\n平时分加满谢谢";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("text").innerText += text[i] === "\n" ? "\n" : text[i];
        i++;
        setTimeout(type, 80);
    }
}
type();

// ===== 音乐控制 =====
const music = document.getElementById("music");

function unlockMusic(){
    music.muted = false;
    music.play();
}

// 任意点击解锁
document.body.addEventListener("click", () => {
    unlockMusic();
});

// ===== 粒子系统 =====
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 120; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        dx: (Math.random() - 0.5),
        dy: (Math.random() - 0.5)
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#00f6ff";

    particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;

        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
