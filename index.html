<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>感谢肖瑶老师</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:"Microsoft YaHei";

    background:
    radial-gradient(circle at top left,#0f6b87 0%,transparent 35%),
    radial-gradient(circle at bottom right,#2b2f96 0%,transparent 35%),
    linear-gradient(135deg,#081423,#101c48);

    position:relative;
}

/* 中间主卡片 */

.card{

    position:relative;
    z-index:2;

    width:92%;
    max-width:900px;

    padding:45px 35px;

    border-radius:28px;

    backdrop-filter:blur(18px);

    background:
    linear-gradient(
    135deg,
    rgba(255,255,255,0.18),
    rgba(255,255,255,0.08)
    );

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 0 40px rgba(0,255,255,0.18);

    overflow:hidden;
}

/* gif背景 */

.card::before{

    content:"";

    position:absolute;

    inset:0;

    background:url('help.gif') center center/cover no-repeat;

    filter:blur(8px) brightness(0.45);

    transform:scale(1.1);

    z-index:-1;
}

/* 顶部英文 */

.top-title{

    color:#8ff7ff;

    letter-spacing:6px;

    font-size:22px;

    margin-bottom:38px;
}

/* 主文字 */

.main-text{

    font-size:68px;

    font-weight:bold;

    line-height:1.45;

    color:white;

    text-shadow:
    0 0 8px #00ffff,
    0 0 20px #00ffff,
    0 0 35px #00ffff;

    animation:glow 2s infinite alternate;
}

/* emoji */

.emoji{

    margin-top:30px;

    font-size:62px;

    animation:float 2s infinite ease-in-out;
}

/* 音乐按钮 */

.music-btn{

    margin-top:38px;

    border:none;

    padding:18px 45px;

    border-radius:999px;

    color:white;

    font-size:22px;

    cursor:pointer;

    background:
    linear-gradient(
    90deg,
    #1ad6ff,
    #7b42ff
    );

    box-shadow:
    0 0 20px rgba(0,255,255,0.45);

    transition:0.3s;
}

.music-btn:hover{

    transform:scale(1.08);

    box-shadow:
    0 0 35px rgba(0,255,255,0.8);
}

/* 底部 */

.bottom-text{

    margin-top:28px;

    color:#d8d8d8;

    font-size:18px;
}

/* 发光动画 */

@keyframes glow{

    from{

        text-shadow:
        0 0 6px #00ffff,
        0 0 18px #00ffff;
    }

    to{

        text-shadow:
        0 0 12px #00ffff,
        0 0 30px #00ffff,
        0 0 50px #00ffff;
    }
}

/* emoji浮动 */

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* 手机适配 */

@media(max-width:768px){

    .main-text{

        font-size:42px;
    }

    .top-title{

        font-size:15px;

        letter-spacing:3px;
    }

    .music-btn{

        font-size:18px;

        padding:15px 30px;
    }

    .emoji{

        font-size:46px;
    }
}

</style>
</head>

<body>

<div class="bg-left"></div>
<div class="bg-right"></div>

<div class="card">

    <div class="top-title">
        MCU CAR PROJECT
    </div>

    <div class="main-text">
        感谢肖瑶老师<br>
        一路以来的指导与帮助<br>
        单片机小车终于完成啦<br>
    </div>

    <div class="emoji">
        🫡
    </div>

    <button class="music-btn" onclick="playMusic()">
        点击播放音乐 🎶
    </button>

    <div class="bottom-text">
        感谢老师这段时间的指导与帮助
    </div>

</div>

<!-- 安卓兼容 + 防缓存 -->

<audio id="bgm" loop preload="auto">
    <source src="tafei.mp3?v=2" type="audio/mpeg">
</audio>

<script>

/* 获取音乐对象 */

const music = document.getElementById("bgm");

/* 音量 */

music.volume = 0.9;

/* 安卓兼容自动播放 */

function autoPlayMusic() {

    const playPromise = music.play();

    if (playPromise !== undefined) {

        playPromise.catch(() => {

            const unlock = () => {

                music.play();

                document.removeEventListener("touchstart", unlock);

                document.removeEventListener("click", unlock);
            };

            /* 安卓 */

            document.addEventListener("touchstart", unlock, false);

            /* PC */

            document.addEventListener("click", unlock, false);
        });
    }
}

/* 页面加载 */

window.addEventListener("load", autoPlayMusic);

/* 按钮播放 */

function playMusic(){

    music.play();
}

</script>

</body>
</html>
